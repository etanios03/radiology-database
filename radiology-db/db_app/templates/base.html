<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Patient Registry{% endblock %}</title>
    <style> /*https://www.w3schools.com/html/html_css.asp */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier New';
            background: #f5f3f0;
            color: #1a1a1a;
            min-height: 100vh;
        }

        nav {
            background: #49809c;
            padding:10px 35px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        nav a {
            color: #000000;
            text-decoration: none;
            font-size: 14px;
        }
        nav a:hover { color: #fff; }
        nav .brand {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            margin-right: auto;
        }
        main {
            max-width:1200px;
            margin: 0 auto;
            padding: 40px 35px;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 25px;
        }
        h3 {
            font-size: 13px;
            color:#555;
            margin-bottom: 10px;
            margin-top: 35px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: #fff;
            border: 1px solid #383838;
        }
        th {
            background: #b3e0f7;
            color: #000000;
            text-align: left;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: normal;
        }
        td {
            padding: 10px 15px;
            border-bottom: 1px solid #383838;
            vertical-align: top;
        }
        tr:hover td { background: #f9f9f9; }
        a { 
            color: #1a6e38; text-decoration: none; }
        a:hover { 
            text-decoration: underline; }
        .add-link {
            display: inline-block;
            margin-bottom: 10px;
            font-size: 13px;
            color: #888;
            border: 1px solid #ccc;
            padding: 5px 10px;
            border-radius: 2px;
        }
        .add-link:hover { 
            background: #bfd0d8; color: #000000; text-decoration: none; 
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            font-size: 13px;
            color: #888;
        }
        .back-link:hover { 
            color: #b3e0f7; text-decoration: none; 
        }
        .empty-row td { 
            color: #aaa; font-style: italic; 
        }
        hr { 
            border: none; border-top: 1px solid #ddd; margin: 35px 0; 
        }
        .patient-meta {
            font-size: 13px;
            color: #555;
            margin-bottom: 35px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .patient-meta span strong { color: #000000; }
        .section-block { 
            margin-bottom: 10px; 
        }
        .btn {
            margin-top: 20px;
            background: #b0cbea;
            color: #000000;
            border: 1px solid #000000;
            border-radius: 10px;
            padding: 10px 30px;
            font-family: 'Courier New';
            font-size: 13px;
            cursor: pointer;
        }
        .btn:hover {
            background: #6399b3;
            color: #fff;
        }

form p {
    margin-bottom: 20px; 
}
    </style>
</head>
<body>
    <nav>
        <span class="brand">&#9632; Radiology DB</span>
        <a href="/">Patients</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
